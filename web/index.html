<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #f7fbff;
    }

    #flutter_host {
      width: 100vw;
      height: 100vh;
      position: fixed;
      inset: 0;
    }

    #loading_shell {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f7fbff, #eef4ff, #fff7ee);
      color: #1f2937;
      font: 600 18px/1.4 sans-serif;
      z-index: 1;
    }

    #loading_card {
      width: min(560px, calc(100vw - 48px));
      padding: 28px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.90);
      border: 1px solid rgba(203, 213, 225, 0.9);
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.10);
    }

    #loading_title {
      margin: 0 0 10px;
      font-size: 32px;
      font-weight: 800;
    }

    #loading_message {
      margin: 0;
      color: #334155;
    }

    flt-glass-pane {
      position: fixed !important;
      inset: 0 !important;
      display: block !important;
      width: 100vw !important;
      height: 100vh !important;
    }
  </style>

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Cartiqo">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <!-- Cache-bust favicon updates on deploys -->
  <link rel="icon" type="image/png" href="favicon.png?v=cartiqo"/>

  <title>Cartiqo</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    // One-time cache reset:
    // If a previous Flutter service worker is controlling this origin, it can keep
    // serving an older main.dart.js even after deploy. Clear it once, then reload.
    (function () {
      try {
        var key = 'cartiqo_sw_cache_reset_v1';
        if (window.localStorage && localStorage.getItem(key) === '1') return;
        if (!('serviceWorker' in navigator)) {
          if (window.localStorage) localStorage.setItem(key, '1');
          return;
        }
        Promise.resolve()
          .then(function () { return navigator.serviceWorker.getRegistrations(); })
          .then(function (regs) {
            return Promise.all((regs || []).map(function (r) { return r.unregister(); }));
          })
          .then(function () {
            if (!('caches' in window)) return;
            return caches.keys().then(function (keys) {
              return Promise.all(keys.map(function (k) { return caches.delete(k); }));
            });
          })
          .then(function () {
            if (window.localStorage) localStorage.setItem(key, '1');
            // Reload to ensure we fetch fresh assets from the network.
            window.location.reload();
          })
          .catch(function () {
            if (window.localStorage) localStorage.setItem(key, '1');
          });
      } catch (_) {}
    })();
  </script>
  <div id="loading_shell">
    <div id="loading_card">
      <p id="loading_title">Cartiqo</p>
      <p id="loading_message">Loading website...</p>
    </div>
  </div>
  <div id="flutter_host"></div>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
